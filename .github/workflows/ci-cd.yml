# 工作流的名称
name: Spring Boot CI/CD Pipeline (Teaching Edition)

# 触发条件：仅在代码推送到 main 分支时触发
on:
  push:
    branches:
      - main 

# 定义工作流中的具体任务（Jobs）
jobs:
  # ==========================================
  # 阶段一：单元测试 (test)
  # ==========================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟环境

    # 启动 MySQL 服务容器，供 @SpringBootTest 集成测试使用
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "@Passw0rd"
          MYSQL_DATABASE: store
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. 检出 GitHub 仓库中的代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 JDK 运行环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' 
          distribution: 'temurin' 
          cache: 'maven' # 开启 Maven 依赖缓存，提升后续运行速度

      # 3. 初始化数据库（【新赠步骤】执行根目录下的 store.sql 脚本）
      - name: Initialize Database with store.sql
        run: |
          echo "正在连接 MySQL 并导入初始化脚本 store.sql..."
          mysql -h 127.0.0.1 -P 3306 -u root -p"@Passw0rd" store < store.sql
          echo "数据库初始化完成！"

      # 4. 执行 Spring Boot 单元测试
      - name: Execute Spring Boot Tests
        run: mvn test

  # ==========================================
  # 阶段二：构建镜像 (build-image)
  # ==========================================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # 【核心约束】必须等待 test 阶段成功完成后，才执行本阶段

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境（构建 Jar 包需要）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. 将项目打包成 Jar 包（跳过测试，因为上一阶段已经测过了）
      - name: Package Application to JAR
        run: mvn package -DskipTests

      # 4. 构建 Docker 镜像 (使用 GitHub Commit SHA 作为镜像版本号)
      - name: Build Docker Image
        run: docker build -t springboot-app:${{ github.sha }} .

      # 5. 【教学模拟】模拟推送镜像到远程仓库
      - name: Simulate Docker Push
        run: |
          echo "================================================="
          echo "🚀 [教学演示] 正在模拟连接到远程 Docker Hub..."
          echo "🔑 [教学演示] 模拟执行: docker login"
          echo "📦 [教学演示] 准备推送镜像: springboot-app:${{ github.sha }}"
          echo "⬆️  [教学演示] 模拟执行: docker push springboot-app:${{ github.sha }}"
          echo "✅ [教学演示] 镜像推送完成！(此处为模拟执行，未真实消耗网络与存储)"
          echo "================================================="